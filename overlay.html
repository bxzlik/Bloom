<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Bloom Overlay</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none}
:root{
  --bg:#1b1b1d;--bg2:#262628;--accent:#fff;--accent-rgb:255,255,255;
  --text:#fff;--text2:#9a9a9a;--muted:#5a5a5a;
  --font:-apple-system,'SF Pro Display','SF Pro Text','Segoe UI','Roboto',system-ui,sans-serif;
  --ov-op:0.9;--ov-from:-14px;
}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;
  font-family:var(--font);-webkit-font-smoothing:antialiased;}
/* Прозрачные поля окна не реагируют на мышь; интерактивна только сама плашка
   (pointer-events наследуется детьми → кнопки кликабельны). Сам click-through на
   уровне ОС переключает Rust (overlay_set_interactive) по видимости плашки. */
body{display:flex;align-items:center;justify-content:center;pointer-events:none}

/* ── Плашка-«остров» ─────────────────────────────────── */
.island{
  position:relative;overflow:hidden;
  width:380px;height:64px;display:flex;align-items:center;gap:12px;
  padding:8px 18px 8px 8px;
  background:linear-gradient(180deg,var(--bg2),var(--bg));
  border:1px solid rgba(255,255,255,.07);
  border-radius:40px;
  box-shadow:0 8px 22px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.4),inset 0 0 0 .5px rgba(255,255,255,.04);
  opacity:0;transform:translateY(var(--ov-from)) scale(.96);
  transition:opacity .26s ease,transform .26s cubic-bezier(.22,1,.36,1);
  pointer-events:auto;
}
.island.show{opacity:var(--ov-op);transform:translateY(0) scale(1)}

/* ── Полоса прогресса (по нижней кромке капсулы) ──────── */
.prog{position:absolute;left:0;right:0;bottom:0;height:2px;background:rgba(255,255,255,.12)}
.prog-fill{height:100%;width:0%;background:var(--accent);transition:width .25s linear}
/* Перематываемый прогресс: курсор + расширенная зона клика (невидимый «язычок»
   вверх над тонкой полоской) + чуть толще на наведении для удобства попадания. */
.prog.seekable{cursor:pointer}
.prog.seekable::before{content:'';position:absolute;left:0;right:0;bottom:0;top:-9px}
.prog.seekable:hover{height:4px}

/* ── Обложка ─────────────────────────────────────────── */
.cover{
  width:48px;height:48px;flex-shrink:0;position:relative;
  border-radius:50%;background:var(--bg);overflow:hidden;
  display:flex;align-items:center;justify-content:center;color:var(--muted);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
}
.cover img{width:100%;height:100%;object-fit:cover;display:block}

/* ── Текст ───────────────────────────────────────────── */
.info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:2px}
.title-wrap{max-width:100%;width:100%;overflow:hidden}
.title{font-size:14px;font-weight:700;color:var(--text);
  white-space:nowrap;line-height:1.2;display:inline-block}
@keyframes ov-marquee{0%{transform:translateX(0)}100%{transform:translateX(var(--ov-off,0))}}
.title-wrap.scrolling .title{animation:ov-marquee linear infinite;will-change:transform}
.title-wrap.scrolling:hover .title{animation-play-state:paused}
.artist{font-size:12px;color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.tra-link{cursor:pointer;transition:color .1s}
.tra-link:hover{color:var(--text);text-decoration:underline}

/* ── Правый слот: эквалайзер (покой) ↔ кнопки (наведение) ──
   Оба лежат в одной grid-ячейке (стопкой), плавный кросс-фейд по :hover. */
.right{display:grid;width:106px;flex-shrink:0;justify-items:end;align-items:center}
.right>*{grid-area:1/1;transition:opacity .18s ease,transform .18s cubic-bezier(.22,1,.36,1)}

.eq{display:flex;align-items:flex-end;gap:2.5px;height:18px;padding-right:6px}
.eq i{width:3px;border-radius:2px;background:var(--accent);height:30%;
  transform-origin:bottom;animation:eqb .9s ease-in-out infinite}
.eq i:nth-child(1){animation-delay:-.2s}
.eq i:nth-child(2){animation-delay:-.5s}
.eq i:nth-child(3){animation-delay:-.1s}
.eq i:nth-child(4){animation-delay:-.7s}
.eq i:nth-child(5){animation-delay:-.4s}
@keyframes eqb{0%,100%{height:25%}50%{height:100%}}
body.paused .eq i{animation-play-state:paused;height:30%}
/* Плашка спрятана (opacity:0) — глушим её вечные анимации: невидимый элемент
   всё равно анимируется, а height-анимация эквалайзера — это layout каждый кадр. */
.island:not(.show) .eq i{animation-play-state:paused}
.island:not(.show) .title-wrap.scrolling .title{animation-play-state:paused}

.ctrl{display:flex;align-items:center;gap:3px;opacity:0;transform:translateY(4px) scale(.96);pointer-events:none}
.island:hover .eq{opacity:0;transform:translateY(-4px)}
.island:hover .ctrl{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}

.cbtn{
  width:30px;height:30px;flex-shrink:0;border:none;background:none;color:var(--text);
  cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;
  opacity:.82;transition:background .12s,opacity .12s,transform .08s;
}
.cbtn:hover{background:rgba(255,255,255,.14);opacity:1}
.cbtn:active{transform:scale(.92)}
.cbtn-play{width:34px;height:34px;background:var(--accent);color:#000;opacity:1}
.cbtn-play:hover{background:var(--accent);filter:brightness(1.1)}

/* ── Режим оптимизации ───────────────────────────────────
   Убираем эквалайзер, отключаем бегущую строку (заголовок обрезается «…») и
   прячем полосу прогресса — её постоянная перерисовка дорогая. Полоса
   показывается только при наведении. */
body.perf .eq{display:none}
body.perf .title{overflow:hidden;text-overflow:ellipsis;max-width:100%}
body.perf .prog{display:none}
body.perf .island:hover .prog{display:block}

/* ── Компактный режим ────────────────────────────────────
   Покой: только обложка + эквалайзер (текст схлопнут). Наведение: плашка
   доезжает до полной ширины, проявляются текст и кнопки. Плашка прижата к
   якорному краю окна (классы al/ac/ar ставит JS), с зазором под тень. */
body.compact .island{width:132px;
  transition:width .26s cubic-bezier(.22,1,.36,1),padding .26s cubic-bezier(.22,1,.36,1),gap .26s cubic-bezier(.22,1,.36,1),opacity .26s ease,transform .26s cubic-bezier(.22,1,.36,1)}
/* Компакт + оптимизация: эквалайзера нет — свёрнутая плашка обтягивает обложку
   «кружком» (без зазоров флекса и лишнего паддинга, чтобы не было пустого поля). */
/* padding:7px — чтобы обложка 48px влезла ровно в контент-бокс (64 − 2 рамки −
   2×7 = 48) и была строго по центру, без перекоса из-за border-box. */
body.compact.perf .island{width:64px;padding:7px;gap:0}
body.compact.perf .island:hover{width:380px;padding:8px 18px 8px 8px;gap:12px}
/* Колонку грида фиксируем под ширину слота — иначе она тянется под кнопки
   управления (самый широкий элемент) и эквалайзер уезжает в обрезку. */
body.compact .right{width:34px;grid-template-columns:100%;transition:width .26s cubic-bezier(.22,1,.36,1)}
body.compact.perf .right{width:0}
body.compact .info{opacity:0;transition:opacity .12s ease}
body.compact .island:hover{width:380px}
body.compact .island:hover .right{width:106px}
body.compact .island:hover .info{opacity:1;transition:opacity .2s ease .08s}
/* Бегущая строка крутится только в раскрытом состоянии (экономим в покое). */
body.compact .island:not(:hover) .title-wrap.scrolling .title{animation-play-state:paused}
/* Прижатие к якорному краю + зазор под тень (margin масштабируется zoom'ом плашки). */
body.compact.ar{justify-content:flex-end}
body.compact.al{justify-content:flex-start}
body.compact.ac{justify-content:center}
body.compact.ar .island{margin-right:28px}
body.compact.al .island{margin-left:28px}

/* ── Режим ручного размещения ─────────────────────────────
   Вся плашка превращается в drag-ручку: курсор «move», пунктирная рамка-
   подсказка, а кнопки/прогресс не перехватывают перетаскивание. */
body.placing .island{cursor:move;outline:2px dashed var(--accent);outline-offset:3px}
body.placing .island:hover .ctrl,body.placing .ctrl{opacity:0;pointer-events:none}
body.placing .island:hover .eq{opacity:1;transform:none}
body.placing .prog{pointer-events:none}
body.placing .bcenter,body.placing .bcircle-play{pointer-events:none}
/* Живой бейдж с координатами (доли %) во время ручного размещения. */
.place-coords{position:absolute;top:3px;left:50%;transform:translateX(-50%);
  display:none;white-space:nowrap;padding:2px 9px;border-radius:9px;
  font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:.2px;
  background:rgba(0,0,0,.72);color:#fff;border:1px solid rgba(255,255,255,.14);
  box-shadow:0 3px 10px rgba(0,0,0,.4);pointer-events:none;z-index:10}
body.placing .place-coords{display:block}

/* ── Режим «Полоса» ──────────────────────────────────────
   Три отдельных «стеклянных» элемента: круг play/pause слева, полоса с
   названием и прогрессом по центру, круг-визуализатор (эквалайзер) справа.
   Сам .island служит только контейнером (показ/скрытие, drag, масштаб). */
.bar-wrap{display:none}
body.bar .island{background:none;border:none;box-shadow:none;overflow:visible;
  padding:8px;gap:0}
/* В режиме «полоса» прячем штатную раскладку острова. Тонкую `.prog` держим
   скрытой даже в perf-режиме (там островное правило показывает её на hover —
   получался бы второй прогресс-бар поверх заливки центра). */
body.bar .cover,body.bar .info,body.bar .right,body.bar .prog{display:none}
body.bar .island:hover .prog{display:none}
body.bar .bar-wrap{display:flex;align-items:center;gap:8px;width:100%;height:100%}

/* Общий «стеклянный» вид элементов полосы. */
.bcircle{width:48px;height:48px;flex-shrink:0;border-radius:50%;
  display:flex;align-items:center;justify-content:center;color:var(--text);
  background:linear-gradient(180deg,rgba(255,255,255,.11),rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.10);
  box-shadow:0 5px 14px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.13);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.bcircle-play{cursor:pointer;opacity:.95;transition:filter .12s,transform .08s}
.bcircle-play:hover{filter:brightness(1.15);opacity:1}
.bcircle-play:active{transform:scale(.92)}

/* Центральная полоса: название по центру, прогресс — заливкой за текстом.
   Лёгкий блик сверху, как на эталонном дизайне. */
.bcenter{position:relative;flex:1;min-width:0;height:48px;overflow:hidden;
  border-radius:24px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,rgba(255,255,255,.13),rgba(255,255,255,.04));
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 5px 16px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.15);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.bcenter::before{content:'';position:absolute;left:0;right:0;top:0;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,0));
  pointer-events:none}
.bcenter.seekable{cursor:pointer}
.bcenter-fill{position:absolute;left:0;top:0;bottom:0;width:0%;
  background:var(--accent);opacity:.18;transition:width .25s linear;pointer-events:none}
.bcenter-title{position:relative;z-index:1;padding:0 16px;max-width:100%;
  font-size:14px;font-weight:700;color:var(--text);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Визуализатор в правом круге — тот же эквалайзер, 5 столбиков. Перебиваем
   островной кроссфейд `.island:hover .eq{opacity:0}`, чтобы при наведении на
   полосу визуализатор не гас. */
.bcircle-viz .eq{height:20px;padding:0;gap:3px}
body.bar .bcircle-viz .eq{opacity:1;transform:none}
/* Оптимизация: визуализатор анимировать дорого (постоянный repaint), поэтому
   правый круг убираем целиком — центральная полоса (flex:1) растягивается на
   освободившееся место, плашка остаётся сбалансированной. */
body.bar.perf .bcircle-viz{display:none}
</style>
</head>
<body>
<div class="island" id="island">
  <div class="cover" id="cover">
    <svg width="22" height="22" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 19a3 3 0 1 1-6 0a3 3 0 0 1 6 0Zm12-2a3 3 0 1 1-6 0a3 3 0 0 1 6 0ZM9 19V8m12 9V6"/><path stroke-linecap="round" d="m15.735 3.755l-4 1.333c-1.32.44-1.98.66-2.357 1.184S9 7.492 9 8.882V12l12-4v-.45c0-2.533 0-3.8-.83-4.398c-.831-.599-2.032-.198-4.435.603Z"/></g></svg>
  </div>
  <div class="info">
    <div class="title-wrap"><div class="title" id="title">—</div></div>
    <div class="artist" id="artist"></div>
  </div>
  <div class="right">
    <div class="eq"><i></i><i></i><i></i><i></i></div>
    <div class="ctrl">
      <button class="cbtn" id="btnPrev">
        <svg width="17" height="17" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7.34 9.353c-1.787 1.154-1.787 4.14 0 5.294l10.79 6.967c1.736 1.122 3.87-.338 3.87-2.647V5.033c0-2.31-2.134-3.769-3.87-2.648z"/><path stroke-linecap="round" d="M2 5v14"/></g></svg>
      </button>
      <button class="cbtn cbtn-play" id="btnPlay">
        <svg id="ovPlayIcon" width="16" height="16" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.5" d="M20.409 9.353a2.998 2.998 0 0 1 0 5.294L7.597 21.614C5.534 22.737 3 21.277 3 18.968V5.033c0-2.31 2.534-3.769 4.597-2.648z"/></svg>
      </button>
      <button class="cbtn" id="btnNext">
        <svg width="17" height="17" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16.66 9.353c1.787 1.154 1.787 4.14 0 5.294L5.87 21.614C4.135 22.737 2 21.277 2 18.968V5.033c0-2.31 2.134-3.769 3.87-2.648z"/><path stroke-linecap="round" d="M22 5v14"/></g></svg>
      </button>
    </div>
  </div>
  <div class="prog" id="prog"><div class="prog-fill" id="progFill"></div></div>

  <!-- Раскладка режима «полоса» (показывается при body.bar). -->
  <div class="bar-wrap" id="barWrap">
    <button class="bcircle bcircle-play" id="btnPlayBar">
      <svg id="ovPlayIconBar" width="16" height="16" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.5" d="M20.409 9.353a2.998 2.998 0 0 1 0 5.294L7.597 21.614C5.534 22.737 3 21.277 3 18.968V5.033c0-2.31 2.534-3.769 4.597-2.648z"/></svg>
    </button>
    <div class="bcenter" id="barCenter">
      <div class="bcenter-fill" id="progFillBar"></div>
      <div class="bcenter-title" id="titleBar">—</div>
    </div>
    <div class="bcircle bcircle-viz">
      <div class="eq"><i></i><i></i><i></i><i></i><i></i></div>
    </div>
  </div>
</div>
<div class="place-coords" id="placeCoords"></div>

<script>
(function(){
  'use strict';
  var ti = null;
  var st = { title:'', artist:'', artwork:'', source:null, playing:false, pos:0, dur:0 };
  var pinned = false;
  var hideTimer = null;
  var duration = 4;
  var ticker = null;
  var seekEnabled = false;   // перемотка по прогресс-бару (из настроек)
  var perfMode = false;      // режим оптимизации: без эквалайзера и бегущей строки
  var scrubbing = false;     // идёт ручной скраб — не снапаем позицию из пушей

  function $(id){ return document.getElementById(id); }

  function listenEvent(event, fn){
    try{
      var hid = ti.transformCallback(function(e){ fn(e.payload); });
      ti.invoke('plugin:event|listen', { event: event, target: { kind: 'Any' }, handler: hid });
    }catch(e){ console.warn('[ov] listen', event, e); }
  }

  function esc(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  // ── Цвет из обложки (инлайн-порт coverAccent.ts) ──────
  function hslToHex(h, s, l){
    var a = s * Math.min(l, 1 - l);
    function f(n){
      var k = (n + h / 30) % 12;
      var col = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
      return Math.round(255 * col).toString(16).padStart(2, '0');
    }
    return '#' + f(0) + f(8) + f(4);
  }

  var lastArt = null;       // последняя обложка, для которой считали цвет
  var coverColors = null;   // { bg, bg2, accent } | null

  // Применить уже посчитанные цвета обложки поверх темы (если есть).
  function applyComputed(){
    if (!coverColors) return;
    var r = document.documentElement;
    r.style.setProperty('--bg', coverColors.bg);
    r.style.setProperty('--bg2', coverColors.bg2);
    r.style.setProperty('--accent', coverColors.accent);
  }

  // Посчитать доминантный цвет обложки и окрасить плашку. CORS-tainted/ошибка →
  // откат к цвету темы.
  function applyCoverColor(){
    var src = st.artwork;
    if (src === lastArt) { applyComputed(); return; }
    lastArt = src;
    if (!src){ coverColors = null; applyTheme(); return; }
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function(){
      try{
        var c = document.createElement('canvas'); c.width = 32; c.height = 32;
        var x = c.getContext('2d'); if (!x){ coverColors = null; applyTheme(); return; }
        x.drawImage(img, 0, 0, 32, 32);
        var d = x.getImageData(0, 0, 32, 32).data;
        var bH = 0, bS = 0, bL = 0, best = -1;
        for (var i = 0; i < d.length; i += 16){
          var r = d[i]/255, g = d[i+1]/255, b = d[i+2]/255;
          var max = Math.max(r,g,b), min = Math.min(r,g,b);
          var l = (max+min)/2;
          var s = max===min ? 0 : (l < 0.5 ? (max-min)/(max+min) : (max-min)/(2-max-min));
          var score = s * (1 - Math.abs(l-0.5)*1.5);
          if (score > best){
            best = score;
            var h = 0;
            if (max !== min){
              if (max===r) h = ((g-b)/(max-min)+6)%6;
              else if (max===g) h = (b-r)/(max-min)+2;
              else h = (r-g)/(max-min)+4;
              h = Math.round(h*60);
            }
            bH = h; bS = s; bL = l;
          }
        }
        // Тёмный доминант для фона + чуть светлее для верха градиента;
        // сочный, но не кислотный акцент для эквалайзера.
        var sBg = Math.min(0.55, bS*0.9);
        var lBg = Math.max(0.10, Math.min(0.20, bL*0.5));
        coverColors = {
          bg:  hslToHex(bH, sBg, lBg),
          bg2: hslToHex(bH, sBg, Math.min(0.30, lBg + 0.07)),
          accent: hslToHex(bH, Math.min(1, bS*1.3), Math.max(0.45, Math.min(0.65, bL))),
        };
        applyComputed();
      } catch(e){ coverColors = null; applyTheme(); }
    };
    img.onerror = function(){ coverColors = null; applyTheme(); };
    img.src = src;
  }

  function parseArtists(s){
    if (!s) return [];
    return String(s).split(/\s*(?:,|;|&|feat\.?|ft\.?|x|×|with|и)\s+/i)
      .map(function(p){ return p.trim(); }).filter(Boolean);
  }

  // Настройки оверлея (прозрачность/масштаб/длительность) — из общих view-префов.
  function applyPrefs(){
    var p = {};
    try{ p = JSON.parse(localStorage.getItem('bloom_view_prefs') || '{}'); }catch(e){}
    var op = typeof p.overlayOpacity === 'number' ? p.overlayOpacity : 90;
    var size = typeof p.overlaySize === 'number' ? p.overlaySize : 100;
    duration = typeof p.overlayDuration === 'number' ? p.overlayDuration : 4;
    seekEnabled = !!p.overlaySeek;
    perfMode = !!p.overlayPerf;
    var pe = $('prog');
    if (pe) pe.classList.toggle('seekable', seekEnabled);
    var bc = $('barCenter');
    if (bc) bc.classList.toggle('seekable', seekEnabled);
    document.documentElement.style.setProperty('--ov-op', Math.max(0, Math.min(100, op)) / 100);
    // Масштаб плашки. Окно Rust ресайзит синхронно по той же доле.
    $('island').style.zoom = Math.max(50, Math.min(160, size)) / 100;

    // Режим оптимизации + компактная плашка (прижатая к якорному краю).
    var compact = p.overlayMode === 'compact';
    var bar = p.overlayMode === 'bar';
    var body = document.body;
    body.classList.toggle('perf', perfMode);
    body.classList.toggle('compact', compact);
    body.classList.toggle('bar', bar);
    var horiz = (typeof p.overlayPos === 'string' ? p.overlayPos.charAt(1) : 'r') || 'r';
    body.classList.toggle('al', compact && horiz === 'l');
    body.classList.toggle('ac', compact && horiz === 'c');
    body.classList.toggle('ar', compact && horiz === 'r');
    // В компакте ширина/обёртка меняются — пересчёт бегущей строки.
    updateMarquee(true);
  }

  // Тема (акцент + фон блока) — из настроек главного окна (как у мини-плеера).
  function applyTheme(){
    var s = {};
    try{ s = JSON.parse(localStorage.getItem('bloom_settings') || '{}'); }catch(e){}
    var r = document.documentElement;
    if (s.accent){
      var hex = String(s.accent).replace(/\s/g,'');
      r.style.setProperty('--accent', hex);
    }
    if (typeof s.blockR === 'number' && typeof s.blockG === 'number' && typeof s.blockB === 'number'){
      r.style.setProperty('--bg', 'rgb('+s.blockR+','+s.blockG+','+s.blockB+')');
      var l = function(c){ return Math.min(255, Math.round(c + (255-c)*0.07)); };
      r.style.setProperty('--bg2', 'rgb('+l(s.blockR)+','+l(s.blockG)+','+l(s.blockB)+')');
    }
  }

  // Артисты — кликабельные чипы (клик → страница артиста в главном окне).
  function renderArtist(){
    var el = $('artist');
    var parts = parseArtists(st.artist);
    if (!parts.length){ el.textContent = ''; return; }
    el.innerHTML = parts.map(function(a){
      return '<span class="tra-link" data-artist="' + esc(a) + '">' + esc(a) + '</span>';
    }).join(', ');
  }

  // Бегущая строка как в приложении (MarqueeTitle): бесшовный loop — две копии
  // текста с зазором, сдвиг на (ширина+зазор); зазор 64px, скорость 55 px/с.
  // Замер через скрытый дубликат (measureRef в MarqueeTitle): меряем singleW
  // на каждом пуше, НЕ трогая видимый бегунок — поэтому замер остаётся корректным
  // и после догрузки шрифта/смены масштаба. Видимый DOM/анимацию пересобираем
  // только когда реально изменился результат (step) — иначе частые пуши позиции
  // во время игры рвали бы анимацию рестартом в 0%. `force` — для resize.
  var _mqText = null, _mqStep = -1, _mqMeasure = null;
  function updateMarquee(force){
    var wrap = document.querySelector('.title-wrap');
    var el = $('title');
    if (!wrap || !el) return;
    var text = st.title || '—';
    if (!_mqMeasure) {
      _mqMeasure = document.createElement('div');
      _mqMeasure.className = 'title';
      _mqMeasure.setAttribute('aria-hidden', 'true');
      _mqMeasure.style.cssText = 'position:absolute;left:0;top:0;visibility:hidden;white-space:nowrap;pointer-events:none';
      wrap.appendChild(_mqMeasure);
    }
    _mqMeasure.textContent = text;
    var singleW = _mqMeasure.scrollWidth;
    var wrapW = wrap.clientWidth;
    // Режим оптимизации — без прокрутки (заголовок обрезается «…» через CSS).
    var step = (!perfMode && singleW > wrapW + 4) ? singleW + 64 : 0;
    if (!force && text === _mqText && step === _mqStep) return;
    _mqText = text; _mqStep = step;
    wrap.classList.remove('scrolling');
    el.style.removeProperty('--ov-off');
    el.style.removeProperty('animation-duration');
    el.textContent = text;
    if (step > 0){
      var dur = Math.max(4, Math.round(step / 55));
      el.innerHTML = esc(text) +
        '<span aria-hidden="true" style="display:inline-block;min-width:64px"></span>' +
        esc(text);
      el.style.setProperty('--ov-off', '-' + step + 'px');
      el.style.setProperty('animation-duration', dur + 's');
      wrap.classList.add('scrolling');
    }
  }

  // Обложку пересобираем только при смене артворка: innerHTML с <img> на каждом
  // рендере заставлял вебвью пересоздавать и декодировать картинку.
  var _coverKey = null;
  function render(){
    renderArtist();
    updateMarquee();
    var tb = $('titleBar');
    if (tb) tb.textContent = st.title || '—';
    var key = st.artwork || '';
    if (key !== _coverKey){
      _coverKey = key;
      var cov = $('cover');
      if (st.artwork){
        cov.innerHTML = '<img src="' + esc(st.artwork) + '" alt="">';
      } else {
        cov.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 19a3 3 0 1 1-6 0a3 3 0 0 1 6 0Zm12-2a3 3 0 1 1-6 0a3 3 0 0 1 6 0ZM9 19V8m12 9V6"/><path stroke-linecap="round" d="m15.735 3.755l-4 1.333c-1.32.44-1.98.66-2.357 1.184S9 7.492 9 8.882V12l12-4v-.45c0-2.533 0-3.8-.83-4.398c-.831-.599-2.032-.198-4.435.603Z"/></g></svg>';
      }
    }
    document.body.classList.toggle('paused', !st.playing);
    setPlayIcon();
    applyCoverColor();
    setProgress();
    if (st.playing) startTicker(); else stopTicker();
  }

  /** Плашка сейчас видна на экране (CSS-класс show ставят reveal/hide). */
  function islandShown(){
    var el = $('island');
    return !!el && el.classList.contains('show');
  }

  function setPlayIcon(){
    var html = st.playing
      ? '<path fill="none" stroke="currentColor" stroke-width="1.5" d="M2 6c0-1.886 0-2.828.586-3.414S4.114 2 6 2s2.828 0 3.414.586S10 4.114 10 6v12c0 1.886 0 2.828-.586 3.414S7.886 22 6 22s-2.828 0-3.414-.586S2 19.886 2 18zm12 0c0-1.886 0-2.828.586-3.414S16.114 2 18 2s2.828 0 3.414.586S22 4.114 22 6v12c0 1.886 0 2.828-.586 3.414S19.886 22 18 22s-2.828 0-3.414-.586S14 19.886 14 18z"/>'
      : '<path fill="none" stroke="currentColor" stroke-width="1.5" d="M20.409 9.353a2.998 2.998 0 0 1 0 5.294L7.597 21.614C5.534 22.737 3 21.277 3 18.968V5.033c0-2.31 2.534-3.769 4.597-2.648z"/>';
    var pi = $('ovPlayIcon');
    if (pi) pi.innerHTML = html;
    var pib = $('ovPlayIconBar');
    if (pib) pib.innerHTML = html;
  }

  // ── Прогресс трека (локальный тикер, как в мини-плеере) ──
  function setProgress(){
    var pct = st.dur > 0 ? Math.min(100, st.pos / st.dur * 100) : 0;
    var f = $('progFill');
    if (f) f.style.width = pct + '%';
    var fb = $('progFillBar');
    if (fb) fb.style.width = pct + '%';
  }

  // Команда плееру (играть/пауза/пред/след) — через тот же мост, что мини-плеер.
  function cmd(c){
    try{ ti.invoke('miniplayer_cmd', { cmd: c, value: null }); }catch(e){}
  }
  // Перемотка: тот же мост, что у мини-плеера (Rust → bloom-mp-seek в main).
  function seek(pos){
    try{ ti.invoke('miniplayer_cmd', { cmd: 'seek', value: pos }); }catch(e){}
  }
  // Переключить click-through окна (Rust): плашка видна → ловим мышь.
  function setInteractive(on){
    try{ ti.invoke('overlay_set_interactive', { interactive: on }); }catch(e){}
  }
  function startTicker(){
    if (ticker) return;
    ticker = setInterval(function(){
      if (scrubbing || !st.playing || st.dur <= 0) return;
      st.pos = Math.min(st.pos + 0.25, st.dur);
      setProgress();
    }, 250);
  }
  function stopTicker(){ if (ticker){ clearInterval(ticker); ticker = null; } }

  function update(s){
    if (!s) return;
    if (s.source   !== undefined) st.source   = s.source;
    if (s.title    !== undefined) st.title    = s.title;
    if (s.artist   !== undefined) st.artist   = s.artist;
    if (s.artwork  !== undefined) st.artwork  = s.artwork;
    if (s.playing  !== undefined) st.playing  = s.playing;
    // Снап позиции при заметном расхождении (seek/смена трека); мелкий дрейф
    // игнорируем — его докручивает локальный тикер, иначе бар «дёргается».
    if (s.position !== undefined && !scrubbing && Math.abs(s.position - st.pos) > 1.2) st.pos = s.position;
    if (s.duration !== undefined) st.dur = s.duration;
    // Плашка спрятана — состояние скопили, DOM не трогаем (reveal отрендерит).
    // Rust и так не пушит скрытой плашке, это страховка на гонки показа/скрытия.
    if (!islandShown()){ stopTicker(); return; }
    render();
  }

  function setAnchorDir(anchor){
    // Направление выезда: верхние якоря — сверху, нижние — снизу.
    var from = (anchor && anchor.charAt(0) === 'b') ? '14px' : '-14px';
    document.documentElement.style.setProperty('--ov-from', from);
  }

  function reveal(asPinned){
    applyPrefs();
    if (hideTimer){ clearTimeout(hideTimer); hideTimer = null; }
    $('island').classList.add('show');
    // Пока плашка была спрятана, пуши копились в st без рендера — дорисовываем.
    render();
    setInteractive(true);
    // Закрепляем только по явному запросу (хоткей). Авто-показ при смене трека
    // (asPinned=false) НЕ снимает уже стоящее закрепление.
    if (asPinned) pinned = true;
    if (!pinned){
      hideTimer = setTimeout(hide, Math.max(1, duration) * 1000);
    }
  }
  function hide(){
    if (hideTimer){ clearTimeout(hideTimer); hideTimer = null; }
    $('island').classList.remove('show');
    setInteractive(false);
    pinned = false;
    // Спрятанной плашке тикер не нужен — прогресс дорисуем при следующем показе.
    stopTicker();
  }

  function start(){
    ti = window.__TAURI_INTERNALS__;
    // Отключаем браузерное контекстное меню вебвью (как в miniplayer/tray).
    window.addEventListener('contextmenu', function(e){ e.preventDefault(); }, false);
    applyTheme();
    applyPrefs();

    // Кнопки управления.
    $('btnPrev').addEventListener('click', function(){ cmd('prev'); });
    $('btnNext').addEventListener('click', function(){ cmd('next'); });
    // Оптимистично переключаем иконку/тикер, команду шлём в плеер.
    function togglePlay(){
      st.playing = !st.playing;
      document.body.classList.toggle('paused', !st.playing);
      setPlayIcon();
      if (st.playing) startTicker(); else stopTicker();
      cmd('playpause');
    }
    $('btnPlay').addEventListener('click', togglePlay);
    var btnPlayBar = $('btnPlayBar');
    if (btnPlayBar) btnPlayBar.addEventListener('click', togglePlay);

    // Прогресс-бар: перемотка кликом/скрабом (если включена в настройках).
    // Логика как в мини-плеере: визуал ведём за курсором, аудио сикаем на ходу
    // (throttle) + финальный сик на отпускании; scrubbing гасит эхо-пуши.
    function attachSeek(track, fill){
      if (!track) return;
      var dragging = false, last = 0, wheelTimer = null;
      function posFromEvent(e){
        var r = track.getBoundingClientRect();
        var ratio = (e.clientX - r.left) / r.width;
        ratio = Math.max(0, Math.min(1, ratio));
        return ratio * st.dur;
      }
      track.addEventListener('pointerdown', function(e){
        if (!seekEnabled || !st.dur) return;
        scrubbing = true; dragging = true;
        if (fill) fill.style.transition = 'none';  // заливка без задержки за курсором
        try{ track.setPointerCapture(e.pointerId); }catch(_){}
        st.pos = posFromEvent(e); setProgress(); seek(st.pos);
        last = Date.now(); e.preventDefault();
      });
      track.addEventListener('pointermove', function(e){
        if (!dragging || !st.dur) return;
        st.pos = posFromEvent(e); setProgress();
        var now = Date.now();
        if (now - last > 90){ last = now; seek(st.pos); }
      });
      function endScrub(e){
        if (!dragging) return;
        dragging = false; scrubbing = false;
        if (fill) fill.style.transition = '';
        try{ track.releasePointerCapture(e.pointerId); }catch(_){}
        if (!st.dur) return;
        st.pos = posFromEvent(e); setProgress(); seek(st.pos);
      }
      track.addEventListener('pointerup', endScrub);
      track.addEventListener('pointercancel', endScrub);
      // Колесо над баром → перемотка ±1с.
      track.addEventListener('wheel', function(e){
        if (!seekEnabled || !st.dur) return;
        e.preventDefault();
        scrubbing = true;
        st.pos = Math.max(0, Math.min(st.dur, st.pos + (e.deltaY < 0 ? 1 : -1)));
        setProgress(); seek(st.pos);
        if (wheelTimer) clearTimeout(wheelTimer);
        wheelTimer = setTimeout(function(){ scrubbing = false; }, 250);
      }, { passive:false });
    }
    attachSeek($('prog'), $('progFill'));
    attachSeek($('barCenter'), $('progFillBar'));

    // Клик по имени артиста → страница артиста в главном окне (как в мини-плеере).
    $('artist').addEventListener('click', function(e){
      var link = e.target.closest && e.target.closest('.tra-link');
      if (!link) return;
      var name = link.getAttribute('data-artist');
      if (!name) return;
      try{ ti.invoke('tray_open_artist', { artist: name }); }catch(err){}
    });

    // Пересчёт бегущей строки при смене размера окна (меняется масштаб оверлея).
    window.addEventListener('resize', function(){ updateMarquee(true); });

    // Наведение на плашку держит её открытой (как уведомление); увод — перезапуск
    // авто-скрытия (только если не закреплена).
    var island = $('island');
    island.addEventListener('mouseenter', function(){
      if (hideTimer){ clearTimeout(hideTimer); hideTimer = null; }
      // Компакт: после раскрытия (ширина обёртки выросла) пересчитываем бегущую строку.
      if (document.body.classList.contains('compact')){
        setTimeout(function(){ updateMarquee(true); }, 280);
      }
    });
    island.addEventListener('mouseleave', function(){
      if (pinned) return;
      if (hideTimer) clearTimeout(hideTimer);
      hideTimer = setTimeout(hide, Math.max(1, duration) * 1000);
    });

    // Режим ручного размещения: вся плашка — drag-ручка. OS-перетаскивание
    // (start_dragging) для этого окна не работает — оно no-activate (focus:false),
    // поэтому двигаем окно сами: считаем дельту мыши в экранных координатах и
    // шлём её в Rust. Capture-фаза — чтобы опередить обработчики кнопок/прогресса.
    (function(){
      var dragging = false, lastSX = 0, lastSY = 0;
      island.addEventListener('pointerdown', function(e){
        if (!document.body.classList.contains('placing')) return;
        e.preventDefault(); e.stopPropagation();
        dragging = true; lastSX = e.screenX; lastSY = e.screenY;
        try{ island.setPointerCapture(e.pointerId); }catch(_){}
      }, true);
      island.addEventListener('pointermove', function(e){
        if (!dragging) return;
        var dx = e.screenX - lastSX, dy = e.screenY - lastSY;
        if (!dx && !dy) return;
        lastSX = e.screenX; lastSY = e.screenY;
        try{ ti.invoke('overlay_drag_by', { dx: dx, dy: dy }); }catch(_){}
      }, true);
      function endDrag(e){
        if (!dragging) return;
        dragging = false;
        try{ island.releasePointerCapture(e.pointerId); }catch(_){}
      }
      island.addEventListener('pointerup', endDrag, true);
      island.addEventListener('pointercancel', endDrag, true);
    })();

    listenEvent('bloom-mp-state', function(p){ update(p); });
    listenEvent('bloom-ov-place', function(p){
      var on = !!(p && p.on);
      document.body.classList.toggle('placing', on);
      if (on) reveal(true);   // показать закреплённой, без авто-скрытия
      else hide();
    });
    // Живые координаты (доли → %) во время перетаскивания.
    listenEvent('bloom-ov-placed', function(p){
      if (!p) return;
      var el = $('placeCoords');
      if (el) el.textContent = 'X ' + Math.round(p.x * 100) + '%  ·  Y ' + Math.round(p.y * 100) + '%';
    });
    listenEvent('bloom-ov-show', function(p){
      if (p && p.anchor) setAnchorDir(p.anchor);
      reveal(false);
    });
    listenEvent('bloom-ov-toggle', function(p){
      if (p && p.anchor) setAnchorDir(p.anchor);
      // Тогл: если плашка видна — прячем, иначе закрепляем без авто-скрытия.
      if ($('island').classList.contains('show')) hide();
      else reveal(true);
    });

    // Живое применение настроек/темы из главного окна.
    window.addEventListener('storage', function(e){
      if (e.key === 'bloom_view_prefs'){
        applyPrefs();
        // Сдвинули прозрачность/масштаб, пока плашка видна — обновляем сразу.
      } else if (e.key === 'bloom_settings'){
        applyTheme();
        applyComputed(); // цвет обложки приоритетнее темы, если посчитан
      }
    });

    // Стартовое состояние из кэша.
    try{
      ti.invoke('miniplayer_get_state').then(function(s){ if (s) update(s); }).catch(function(){});
    }catch(e){}
  }

  function waitForTauri(){
    if (window.__TAURI_INTERNALS__) start();
    else setTimeout(waitForTauri, 30);
  }
  waitForTauri();
})();
</script>
</body>
</html>
