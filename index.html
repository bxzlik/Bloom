<!doctype html>
<!-- Инлайн-фон на <html>: окно создаётся с transparent:true (нативная прозрачность),
     без него был бы кадр «дыры в стол» до загрузки CSS-бандла. При включённой
     нативной прозрачности его перебивает html.native-transparent (transparency.css). -->
<html lang="ru" style="background:#0a0a0a">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bloom</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
