name: Release

# Запускается при пуше тега вида v1.0.0
on:
  push:
    tags:
      - 'v*'
  # позволяет запустить вручную из вкладки Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Tauri (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          # Раскомментируй строки ниже, если нужны сборки под macOS / Linux:
          # - platform: macos-latest
          # - platform: ubuntu-latest

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Системные зависимости для Linux (нужны только если включишь ubuntu в matrix)
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Нужно для compile-time env!("DISCORD_CLIENT_ID") в discord_rpc.rs.
          # Общий Bloom Application ID (не секрет — зашит в публичный бинарь).
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Bloom ${{ github.ref_name }}'
          releaseBody: 'Релиз Bloom. Установщики во вложениях ниже.'
          releaseDraft: false
          prerelease: false
