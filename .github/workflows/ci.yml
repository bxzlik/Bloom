name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Отменяем предыдущий прогон, если запушили новый коммит
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Typecheck & build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (tsc + vite)
        run: npm run build
