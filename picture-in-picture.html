<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Bloom PiP</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none}
:root{
  --bg:#1a1a1a;--bg2:#242424;--border:rgba(255,255,255,.08);
  --accent:#fff;--accent2:#e5e5e5;--accent-rgb:255,255,255;--accent-text:#000;
  --text:#fff;--text2:#9a9a9a;--muted:#5a5a5a;
  --font:-apple-system,'SF Pro Display','SF Pro Text','Segoe UI','Roboto',system-ui,sans-serif;
  --radius:14px;
}
html,body{
  width:100%;height:100%;overflow:hidden;position:relative;
  font-family:var(--font);-webkit-font-smoothing:antialiased;
  background:#000;color:var(--text);
}

/* ── Titlebar (same as main app, now floats over cover) ─ */
#winTitlebar{
  position:absolute;top:0;left:0;right:0;z-index:20;
  height:32px;display:flex;align-items:center;gap:8px;
  padding:0 0 0 12px;
  user-select:none;-webkit-user-select:none;
  background:linear-gradient(to bottom, rgba(0,0,0,.55), rgba(0,0,0,0));
}
#winDrag{
  flex:1;height:100%;display:flex;align-items:center;gap:8px;
  cursor:grab;overflow:hidden;min-width:0;
}
#winDrag:active{cursor:grabbing}
.win-icon{
  width:16px;height:16px;flex-shrink:0;pointer-events:none;
  background-color:currentColor;color:rgba(255,255,255,.72);
  -webkit-mask-image:url('/logo.png');mask-image:url('/logo.png');
  -webkit-mask-size:contain;mask-size:contain;
  -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;
  -webkit-mask-position:center;mask-position:center;
}
.win-title{
  font-size:12px;font-weight:600;color:rgba(255,255,255,.8);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  pointer-events:none;min-width:0;
}
.win-btns{display:flex;align-items:center;margin-left:auto;flex-shrink:0}
.win-btn{
  width:46px;height:32px;border:none;background:transparent;
  color:rgba(255,255,255,.72);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s;flex-shrink:0;
}
.win-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
.win-btn.on{color:var(--accent)}
.win-close:hover{background:#c42b1c!important;color:#fff!important}

/* ── Cover fills the whole window ──────────────────── */
.cover{
  position:absolute;inset:0;z-index:0;
  background:var(--bg2);overflow:hidden;
  display:flex;align-items:center;justify-content:center;color:var(--muted);
}
.cover img{width:100%;height:100%;object-fit:cover;display:block}

/* ── Scrim — затемнение только при наведении (читаемость кнопок/тайтлбара) ── */
.scrim{
  position:absolute;inset:0;z-index:2;opacity:0;pointer-events:none;
  transition:opacity .2s;
  background:linear-gradient(to bottom,
    rgba(0,0,0,.45) 0%, rgba(0,0,0,.05) 26%,
    rgba(0,0,0,.05) 42%, rgba(0,0,0,.72) 100%);
}
body:hover .scrim{opacity:1}

/* ── Track info — по центру поверх обложки, всегда видно ── */
.info-center{
  position:absolute;inset:0;z-index:3;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:52px 22px 72px;text-align:center;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
}
body:hover .info-center{transform:translateY(-16px)}
.info-text{
  width:100%;min-width:0;display:flex;flex-direction:column;
  align-items:center;gap:3px;
}
.title-wrap{
  max-width:100%;width:100%;overflow:hidden;
  display:flex;justify-content:center;
}
.title{
  font-size:17px;font-weight:800;color:#fff;letter-spacing:-.01em;
  white-space:nowrap;cursor:pointer;transition:color .12s;
  display:inline-block;pointer-events:auto;
  text-shadow:0 1px 3px rgba(0,0,0,.55);
}
.title:hover{color:var(--accent)}
@keyframes mp-marquee{0%{transform:translateX(0)}100%{transform:translateX(var(--mp-off,0))}}
.title-wrap.scrolling{justify-content:flex-start}
.title-wrap.scrolling .title{animation:mp-marquee linear infinite;will-change:transform}
.title-wrap.scrolling:hover .title{animation-play-state:paused}
.artist{
  max-width:100%;font-size:13px;color:rgba(255,255,255,.82);pointer-events:auto;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-shadow:0 1px 2px rgba(0,0,0,.5);
}
.tra-link{cursor:pointer;transition:color .1s}
.tra-link:hover{color:#fff;text-decoration:underline}

/* ── Hover UI — прогресс/кнопки/громкость, появляются при наведении ── */
.hover-ui{
  position:absolute;left:0;right:0;bottom:0;z-index:4;
  padding:0 12px 8px;
  display:flex;flex-direction:column;
  opacity:0;transform:translateY(10px);
  transition:opacity .18s,transform .18s;
}
body:hover .hover-ui{opacity:1;transform:none}

/* ── Toast ─────────────────────────────────────────── */
.toast{
  position:absolute;left:50%;top:14px;transform:translateX(-50%);
  background:rgba(0,0,0,.85);color:var(--text);
  font-size:11px;font-weight:600;
  padding:6px 12px;border-radius:calc(var(--radius)*0.5);
  pointer-events:none;opacity:0;transition:opacity .18s;
  z-index:50;white-space:nowrap;
}
.toast.show{opacity:1}

/* ── Add popup (matches main app #cxPlFlyout) ──────── */
@keyframes apIn{from{opacity:0;transform:scale(.92) translateY(-5px)}to{opacity:1;transform:scale(1) translateY(0)}}
.add-popup{
  position:fixed;z-index:100;
  background:color-mix(in srgb, var(--bg2) 50%, #000 50%);
  border:1px solid rgba(255,255,255,.07);
  border-radius:calc(var(--radius) * 0.9);
  padding:5px;min-width:185px;max-width:240px;
  box-shadow:0 20px 60px rgba(0,0,0,.85),0 6px 20px rgba(0,0,0,.5),0 0 0 0.5px rgba(255,255,255,.04);
  display:none;max-height:320px;overflow-y:auto;
}
.add-popup.open{display:block;animation:apIn .15s cubic-bezier(.34,1.25,.64,1)}
.ci{
  padding:7px 10px;font-size:12.5px;cursor:pointer;
  border-radius:calc(var(--radius) * 0.5);
  display:flex;align-items:center;gap:8px;color:var(--text);
  transition:background .1s,box-shadow .1s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ci:hover{background:rgba(255,255,255,.07);box-shadow:inset 2.5px 0 0 var(--accent)}
.ci-icon{
  width:22px;height:22px;border-radius:5px;
  background:rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .1s;
}
.ci:hover .ci-icon{background:rgba(255,255,255,.11)}
.ci.accent{color:var(--accent);font-weight:600}
.cx-sep{height:1px;background:rgba(255,255,255,.08);margin:4px 3px;opacity:.65}

/* ── Progress ─────────────────────────────────────── */
.prog-wrap{margin-bottom:4px;flex-shrink:0}
.prog-track{
  height:3px;background:rgba(255,255,255,.28);
  border-radius:2px;cursor:pointer;position:relative;
}
.prog-fill{
  position:absolute;left:0;top:0;height:100%;
  background:var(--accent);border-radius:2px;
  pointer-events:none;transition:width .08s linear;
}
.prog-times{
  display:flex;justify-content:space-between;
  font-size:10px;color:rgba(255,255,255,.7);
  font-variant-numeric:tabular-nums;
  margin-top:5px;
  text-shadow:0 1px 4px rgba(0,0,0,.5);
}
.prog-times .cur{color:#fff}

/* ── Controls ─────────────────────────────────────── */
.ctrl{
  display:flex;align-items:center;justify-content:center;gap:2px;
  padding:4px 0;flex-shrink:0;
}
.cc{
  width:34px;height:34px;border-radius:calc(var(--radius)*0.7);
  background:none;border:none;color:rgba(255,255,255,.82);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s;position:relative;
}
.cc:hover{color:#fff;background:rgba(255,255,255,.15)}
.cc.on{color:var(--accent)}
.cc.on::after{
  content:'';position:absolute;bottom:3px;left:50%;
  transform:translateX(-50%);width:3px;height:3px;
  border-radius:50%;background:var(--accent);
}
.cc.fav.on{color:#e03030}
.cc.fav.on::after{display:none}
.cc-play{
  width:44px;height:44px;border-radius:calc(var(--radius)*0.85);
  background:var(--accent);border:none;color:var(--accent-text);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .12s,transform .08s;
  margin:0 4px;
}
.cc-play:hover{background:var(--accent2)}
.cc-play:active{transform:scale(.94)}
/* Плоская кнопка play: без фона + крупная иконка, как в осн. окне. Ведёт себя как .cc. */
body.play-flat .cc-play{width:38px;height:38px;border-radius:calc(var(--radius)*0.7);background:none;color:#fff}
body.play-flat .cc-play:hover{background:rgba(255,255,255,.15);color:var(--accent)}
body.play-flat .cc-play svg{width:22px;height:22px}

/* ── Volume ───────────────────────────────────────── */
.vol{
  display:flex;align-items:center;gap:8px;
  padding:6px 4px 2px;flex-shrink:0;
}
.vol-btn{
  width:28px;height:28px;border:none;background:transparent;
  color:rgba(255,255,255,.82);cursor:pointer;border-radius:calc(var(--radius)*0.4);
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s;flex-shrink:0;
}
.vol-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.vol-sl{
  -webkit-appearance:none;appearance:none;flex:1;height:3px;border-radius:2px;
  background:rgba(255,255,255,.28);outline:none;cursor:pointer;
}
.vol-sl::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:11px;height:11px;
  border-radius:50%;background:var(--text);cursor:pointer;
}
.vol-num{
  font-size:10px;color:rgba(255,255,255,.7);
  font-variant-numeric:tabular-nums;
  min-width:26px;text-align:right;
  text-shadow:0 1px 4px rgba(0,0,0,.5);
}
</style>
</head>
<body>

<!-- Titlebar -->
<div id="winTitlebar">
  <div id="winDrag">
    <span class="win-icon"></span>

</div>

<!-- Full-window cover (background) -->
<div class="cover" id="tCover">
  <svg width="28" height="28" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 19a3 3 0 1 1-6 0a3 3 0 0 1 6 0Zm12-2a3 3 0 1 1-6 0a3 3 0 0 1 6 0ZM9 19V8m12 9V6"/><path stroke-linecap="round" d="m15.735 3.755l-4 1.333c-1.32.44-1.98.66-2.357 1.184S9 7.492 9 8.882V12l12-4v-.45c0-2.533 0-3.8-.83-4.398c-.831-.599-2.032-.198-4.435.603Z"/></g></svg>
</div>

<!-- Hover scrim (darkens for legibility) -->
<div class="scrim"></div>

<!-- Centered title / artist (always visible over the cover) -->
<div class="info-center">
  <div class="info-text">
    <div class="title-wrap"><div class="title" id="tTitle"></div></div>
    <div class="artist" id="tArtist">—</div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="add-popup" id="addPopup"></div>

<!-- Hover controls: progress + transport + volume -->
<div class="hover-ui">

  <!-- Progress -->
  <div class="prog-wrap">
    <div class="prog-track" id="progTrack">
      <div class="prog-fill" id="progFill" style="width:0%"></div>
    </div>
    <div class="prog-times">
      <span class="cur" id="tPos">0:00</span>
      <span id="tDur">0:00</span>

    </button>
    <button class="cc" id="btnShuf" onclick="cmd('shuffle')">
      <svg width="14" height="14" viewBox="0 0 24 24"><path fill="currentColor" d="M2 16.25a.75.75 0 0 0 0 1.5zm8.748-2.163l-.643-.386zm2.504-4.174l.643.386zM22 7l.53.53a.75.75 0 0 0 0-1.06zm-2.53 1.47a.75.75 0 0 0 1.06 1.06zm1.06-4a.75.75 0 1 0-1.06 1.06zm-5.31 2.92l-.369-.653zM2 17.75h3.603v-1.5H2zm9.39-3.277l2.505-4.174l-1.286-.772l-2.504 4.174zm7.007-6.723H22v-1.5h-3.603zm3.073-1.28l-2 2l1.06 1.06l2-2zm1.06 0l-2-2l-1.06 1.06l2 2zm-8.635 3.829c.434-.724.734-1.22 1.006-1.589c.263-.355.468-.543.689-.668l-.739-1.305c-.467.264-.82.627-1.155 1.08c-.326.44-.668 1.011-1.087 1.71zm4.502-4.049c-.815 0-1.48 0-2.025.052c-.562.055-1.054.17-1.521.435l.739 1.305c.22-.125.487-.204.927-.247c.456-.044 1.036-.045 1.88-.045zM5.603 17.75c.815 0 1.48 0 2.025-.052c.562-.055 1.054-.17 1.521-.435l-.739-1.305c-.22.125-.487.204-.927.247c-.456.044-1.036.045-1.88.045zm4.502-4.049c-.435.724-.734 1.22-1.006 1.589c-.263.355-.468.543-.689.668l.74 1.305c.466-.264.819-.627 1.154-1.08c.326-.44.668-1.011 1.087-1.71zM2 6.25a.75.75 0 0 0 0 1.5zM22 17l.53.53a.75.75 0 0 0 0-1.06zm-1.47-2.53a.75.75 0 1 0-1.06 1.06zm-1.06 4a.75.75 0 1 0 1.06 1.06zm-3.345-1.525l.144-.736zm-1.682-2.33a.75.75 0 1 0-1.286.77zm.025 1.391l.558-.501zm-6.593-8.95l.143-.737zm1.682 2.33a.75.75 0 0 0 1.286-.772zm-.025-1.393l-.558.502zM2 7.75h4.668v-1.5H2zm15.332 10H22v-1.5h-4.668zm5.198-1.28l-2-2l-1.06 1.06l2 2zm-1.06 0l-2 2l1.06 1.06l2-2zm-4.138-.22c-.645 0-.867-.003-1.063-.041l-.287 1.472c.372.072.765.069 1.35.069zm-4.175-.864c.3.502.5.84.754 1.122l1.115-1.003c-.134-.149-.25-.337-.583-.89zm3.112.823a2.25 2.25 0 0 1-1.243-.704l-1.115 1.003a3.75 3.75 0 0 0 2.071 1.173zM6.668 7.75c.645 0 .867.003 1.063.041l.287-1.472c-.372-.072-.765-.069-1.35-.069zm4.175.864c-.3-.502-.5-.84-.754-1.122L8.974 8.495c.134.149.25.337.583.89zm-3.112-.823a2.25 2.25 0 0 1 1.243.704l1.115-1.003a3.75 3.75 0 0 0-2.071-1.173z"/></svg>
    </button>
    <button class="cc" id="btnAdd" onclick="cmd('add')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>

    renderArtist(st.artist);
    applyWinTitle();
    updateMarquee();
    setFavIcon(st.fav);

    var key = st.artwork || '';
    if (key !== _coverKey) {
      _coverKey = key;
      var cov = document.getElementById('tCover');
      if (st.artwork) {
        cov.innerHTML = '<img src="' + st.artwork + '" alt="">';
      } else {
        cov.innerHTML = '<svg width="28" height="28" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 19a3 3 0 1 1-6 0a3 3 0 0 1 6 0Zm12-2a3 3 0 1 1-6 0a3 3 0 0 1 6 0ZM9 19V8m12 9V6"/><path stroke-linecap="round" d="m15.735 3.755l-4 1.333c-1.32.44-1.98.66-2.357 1.184S9 7.492 9 8.882V12l12-4v-.45c0-2.533 0-3.8-.83-4.398c-.831-.599-2.032-.198-4.435.603Z"/></g></svg>';
      }
    }

    setPlayIcon(st.playing);
    setProgress(st.pos, st.dur);
    if (st.playing) startTicker(); else stopTicker();

    document.getElementById('btnShuf').classList.toggle('on', !!st.shuffle);
    document.getElementById('btnRep').classList.toggle('on', st.repeat > 0);

    document.getElementById('volSl').value = st.volume;
    document.getElementById('volNum').textContent = st.volume;
    updateVolumeIcon(st.volume);
  }

  // ── Add popup ─────────────────────────────────────
  function getPlaylists() {
    try { return JSON.parse(localStorage.getItem('bloom_playlists') || '[]'); } catch(e) { return []; }
  }
  // Заглушка-винил для плейлистов без обложки (как VinylCover.tsx) — цвет лейбла
  // детерминированно из id, чтобы совпадать с видом в приложении.
  function seedHue(seed) {
    var h = 0;
    for (var i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
    return h % 360;
  }
  function vinylCoverHTML(seed) {
    seed = String(seed);
    var hue = seedHue(seed);
    var label = 'hsl(' + hue + ' 60% 52%)', labelDk = 'hsl(' + hue + ' 58% 38%)';
    var uid = 'v' + Math.random().toString(36).slice(2, 6);
    return '<svg viewBox="0 0 64 64" style="width:100%;height:100%;display:block">' +
      '<defs><radialGradient id="d' + uid + '" cx="38%" cy="32%" r="78%"><stop offset="0%" stop-color="#3b3b40"/><stop offset="45%" stop-color="#1f1f22"/><stop offset="100%" stop-color="#0b0b0d"/></radialGradient>' +
      '<radialGradient id="l' + uid + '" cx="50%" cy="50%" r="60%"><stop offset="0%" stop-color="' + label + '"/><stop offset="100%" stop-color="' + labelDk + '"/></radialGradient></defs>' +
      '<circle cx="32" cy="32" r="31" fill="url(#d' + uid + ')"/>' +
      '<g fill="none" stroke="#fff" stroke-opacity="0.06"><circle cx="32" cy="32" r="27.5"/><circle cx="32" cy="32" r="24.5"/><circle cx="32" cy="32" r="21.5"/><circle cx="32" cy="32" r="18.5"/><circle cx="32" cy="32" r="15.5"/></g>' +
      '<path d="M13 16 A24 24 0 0 1 49 14" fill="none" stroke="#fff" stroke-opacity="0.10" stroke-width="1.4" stroke-linecap="round"/>' +
      '<circle cx="32" cy="32" r="11" fill="url(#l' + uid + ')"/>' +
      '<circle cx="32" cy="32" r="11" fill="none" stroke="#000" stroke-opacity="0.18"/>' +
      '<circle cx="32" cy="32" r="1.7" fill="#0b0b0d"/></svg>';
  }
  function plIconHTML(pl) {
    var inner = pl.cover
      ? '<img src="' + esc(pl.cover) + '" alt="" style="width:100%;height:100%;object-fit:cover">'
      : vinylCoverHTML(pl.id);
    return '<span class="ci-icon" style="background:transparent;overflow:hidden">' + inner + '</span>';
  }
  function closeAddPopup() {
    var p = document.getElementById('addPopup');
    if (p) p.classList.remove('open');
  }
  function toggleAddPopup() {
    var p = document.getElementById('addPopup');
    if (p.classList.contains('open')) { closeAddPopup(); return; }
    if (!st.title) return;
    var pls = getPlaylists();
    var html = '';
    var ICON_DL  = '<svg width="13" height="13" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 15c0 2.828 0 4.243.879 5.121C4.757 21 6.172 21 9 21h6c2.828 0 4.243 0 5.121-.879C21 19.243 21 17.828 21 15M12 3v13m0 0l4-4.375M12 16l-4-4.375"/></svg>';
    var ICON_NT  = '<svg width="12" height="12" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 19a3 3 0 1 1-6 0a3 3 0 0 1 6 0Zm12-2a3 3 0 1 1-6 0a3 3 0 0 1 6 0ZM9 19V8m12 9V6"/><path stroke-linecap="round" d="m15.735 3.755l-4 1.333c-1.32.44-1.98.66-2.357 1.184S9 7.492 9 8.882V12l12-4v-.45c0-2.533 0-3.8-.83-4.398c-.831-.599-2.032-.198-4.435.603Z"/></g></svg>';
    var ICON_PL  = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
    if (st.canAddToLib) {
      html += '<div class="ci accent" data-act="lib"><span class="ci-icon">' + ICON_DL + '</span>' + tr('toLib') + '</div>';
      if (pls.length) html += '<div class="cx-sep"></div>';
    }
    if (!pls.length) {
      html += '<div class="ci" data-act="new"><span class="ci-icon">' + ICON_PL + '</span>' + tr('createPl') + '</div>';
    } else {
      pls.forEach(function(pl) {
        html += '<div class="ci" data-act="pl" data-id="' + esc(pl.id) + '">' + plIconHTML(pl) + esc(pl.name) + '</div>';
      });
      html += '<div class="cx-sep"></div><div class="ci" data-act="new"><span class="ci-icon">' + ICON_PL + '</span>' + tr('newPl') + '</div>';
    }
    p.innerHTML = html;
    p.classList.add('open');
    // Position above #btnAdd
    var btn = document.getElementById('btnAdd');
    var r = btn.getBoundingClientRect();
    var pw = p.offsetWidth, ph = p.offsetHeight;
    // + — крайняя правая кнопка: правый край попапа равняем по правому краю
    // кнопки (висит влево-вверх от неё). Центрирование тут «отрывает» попап от
    // кнопки и налезает на громкость.
    var left = r.right - pw;
    var top  = r.top - ph - 6;
    if (left + pw > window.innerWidth - 6) left = window.innerWidth - pw - 6;
    if (left < 6) left = 6;
    // Над кнопкой не влезло — открываем вниз; затем прижимаем в пределах окна.
    if (top < 6) top = r.bottom + 6;
    if (top + ph > window.innerHeight - 6) top = window.innerHeight - ph - 6;
    if (top < 6) top = 6;
    p.style.left = left + 'px';
    p.style.top  = top  + 'px';
  }
  function onAddPopupClick(e) {
    var it = e.target.closest && e.target.closest('.ci');
    if (!it) return;
    var act = it.getAttribute('data-act');
    if (act === 'lib') invoke('mp_add_to_lib');
    else if (act === 'pl') invoke('mp_add_to_pl', { plId: it.getAttribute('data-id') });
    else if (act === 'new') invoke('mp_open_new_pl');
    closeAddPopup();
  }

  function setPinIcon(on) {
    var btn = document.getElementById('pinBtn');
    if (btn) btn.classList.toggle('on', !!on);
  }
  function togglePin() {
    alwaysOnTop = !alwaysOnTop;
    setPinIcon(alwaysOnTop);
    invoke('plugin:window|set_always_on_top', { value: alwaysOnTop });
  }

  function applySettings(s) {
    if (!s) return;
    var r = document.documentElement;
    if (s.accent) {
      var hex = s.accent.replace(/\s/g, '');
      r.style.setProperty('--accent', hex);
      var m = hex.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
      if (m) {
        var R = parseInt(m[1],16), G = parseInt(m[2],16), B = parseInt(m[3],16);
        r.style.setProperty('--accent-rgb', R+','+G+','+B);
        var lum = 0.2126*(R/255) + 0.7152*(G/255) + 0.0722*(B/255);
        r.style.setProperty('--accent-text', lum > 0.4 ? '#000' : '#fff');
      }
    }
    if (s.accent2) r.style.setProperty('--accent2', s.accent2);
    if (s.radius)  r.style.setProperty('--radius', s.radius);
    if (typeof s.blockR === 'number' && typeof s.blockG === 'number' && typeof s.blockB === 'number') {
      r.style.setProperty('--bg',  'rgb(' + s.blockR + ',' + s.blockG + ',' + s.blockB + ')');
      var l = function(c){ return Math.min(255, Math.round(c + (255-c)*0.06)); };
      r.style.setProperty('--bg2', 'rgb(' + l(s.blockR) + ',' + l(s.blockG) + ',' + l(s.blockB) + ')');
    }
  }
  function loadSettings() {
    try { applySettings(JSON.parse(localStorage.getItem('bloom_settings') || '{}')); } catch(e) {}
  }
  // Плоская кнопка play (без фона, крупная иконка) — всегда включена.
  function applyPlayBtnBg() {
    document.body.classList.add('play-flat');
  }

  window.cmd = function(c) {
    if (c === 'fav') {
      st.fav = !st.fav;
      setFavIcon(st.fav);
      invoke('miniplayer_cmd', { cmd: 'fav', value: null });
      return;
    }
    if (c === 'add') { toggleAddPopup(); return; }
    if (c === 'mute') {
      var cur = parseInt(document.getElementById('volSl').value);
      if (cur > 0) { prevVol = cur; window.onVol(0); }
      else { window.onVol(prevVol || 80); }
      return;
    }
    if (c === 'playpause') {
      st.playing = !st.playing;
      setPlayIcon(st.playing);
      if (st.playing) startTicker(); else stopTicker();
    }
    if (c === 'shuffle') {
      st.shuffle = !st.shuffle;
      document.getElementById('btnShuf').classList.toggle('on', st.shuffle);
    }
    if (c === 'repeat') {
      st.repeat = (st.repeat + 1) % 3;
      document.getElementById('btnRep').classList.toggle('on', st.repeat > 0);
    }
    invoke('miniplayer_cmd', { cmd: c, value: null });
  };

  window.onVol = function(v) {
    v = parseInt(v);
    document.getElementById('volSl').value = v;
    document.getElementById('volNum').textContent = v;
    st.volume = v;
    updateVolumeIcon(v);
    invoke('miniplayer_cmd', { cmd: 'volume', value: v });
  };

  function start() {
    ti = window.__TAURI_INTERNALS__;
    document.documentElement.lang = LOCALE;
    document.getElementById('tTitle').textContent = tr('notSelected');
    loadSettings();
    applyPlayBtnBg();
    readTitlebarPref();
    applyWinTitle();

    // Drag titlebar
    document.getElementById('winDrag').addEventListener('mousedown', function(e) {
      if (e.button !== 0) return;
      invoke('plugin:window|start_dragging');
    });

    document.getElementById('closeBtn').addEventListener('click', function() {
      invoke('close_miniplayer');
    });
    document.getElementById('pinBtn').addEventListener('click', togglePin);
    document.getElementById('openMainBtn').addEventListener('click', function() {
      invoke('open_main_window');
    });

    // Add-popup wiring
    document.getElementById('addPopup').addEventListener('click', onAddPopupClick);
    document.addEventListener('click', function(e) {
      var p = document.getElementById('addPopup');
      if (!p.classList.contains('open')) return;
      if (p.contains(e.target)) return;
      if (e.target.closest && e.target.closest('#btnAdd')) return;
      closeAddPopup();
    });

    // Re-evaluate marquee on resize
    window.addEventListener('resize', function() { updateMarquee(true); });

    // Click title → copy "title — artist"
    document.getElementById('tTitle').addEventListener('click', function() {
      if (!st.title) return;
      var text = st.title + (st.artist ? ' — ' + st.artist : '');
      var ok = function() { showToast(tr('copied')); };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(ok).catch(function(){ showToast(tr('copyError')); });
      }
    });

    // Click artist chip → open artist page in main window
    document.getElementById('tArtist').addEventListener('click', function(e) {
      var link = e.target.closest && e.target.closest('.tra-link');
      if (!link) return;
      var name = link.getAttribute('data-artist');
      if (!name) return;
      invoke('tray_open_artist', { artist: name });
    });

    // Прогресс-бар: полноценный скраб (как в плеере). Визуал ведёт за курсором,
    // аудио сикается на ходу (throttled) + финальный сик на отпускании.
    (function(){
      var track = document.getElementById('progTrack');
      var fill = document.getElementById('progFill');
      function posFromEvent(e) {
        var r = track.getBoundingClientRect();
        var ratio = (e.clientX - r.left) / r.width;
        ratio = Math.max(0, Math.min(1, ratio));
        return ratio * st.dur;
      }
      track.addEventListener('pointerdown', function(e) {
        if (!st.dur) return;
        scrubbing = true;
        dragging = true;
        // Снимаем width-transition — иначе заливка «доезжает» за 80мс и тянется
        // с задержкой за курсором (в плеере её нет).
        if (fill) fill.style.transition = 'none';
        try { track.setPointerCapture(e.pointerId); } catch(_) {}
        var pos = posFromEvent(e);
        setProgress(pos, st.dur);
        invoke('miniplayer_cmd', { cmd: 'seek', value: pos });
        scrubLast = Date.now();
        e.preventDefault();
      });
      track.addEventListener('pointermove', function(e) {
        if (!dragging || !st.dur) return;
        var pos = posFromEvent(e);
        setProgress(pos, st.dur);
        var now = Date.now();
        if (now - scrubLast > 90) { scrubLast = now; invoke('miniplayer_cmd', { cmd: 'seek', value: pos }); }
      });
      function endScrub(e) {
        if (!dragging) return;
        dragging = false;
        scrubbing = false;
        if (fill) fill.style.transition = '';   // вернуть плавность для авто-движения
        try { track.releasePointerCapture(e.pointerId); } catch(_) {}
        if (!st.dur) return;
        var pos = posFromEvent(e);
        setProgress(pos, st.dur);
        invoke('miniplayer_cmd', { cmd: 'seek', value: pos });
      }
      track.addEventListener('pointerup', endScrub);
      track.addEventListener('pointercancel', endScrub);

      // Колесо над прогресс-баром → перемотка ±1с, сик сразу
      // (onProgWheel плеера). Короткий scrubbing-блок (250мс после последнего щелчка)
      // гасит эхо bloom-mp-state, чтобы бар не откатывало.
      var wheelTimer = null;
      track.addEventListener('wheel', function(e) {
        if (!st.dur) return;
        e.preventDefault();
        scrubbing = true;
        st.pos = Math.max(0, Math.min(st.dur, st.pos + (e.deltaY < 0 ? 1 : -1)));
        setProgress(st.pos, st.dur);
        invoke('miniplayer_cmd', { cmd: 'seek', value: st.pos });
        if (wheelTimer) clearTimeout(wheelTimer);
        wheelTimer = setTimeout(function(){ scrubbing = false; }, 250);
      }, { passive: false });
    })();

    // Wheel over volume row → ±1
    document.querySelector('.vol').addEventListener('wheel', function(e) {
      e.preventDefault();
      var v = Math.min(100, Math.max(0, st.volume + (e.deltaY < 0 ? 1 : -1)));
      window.onVol(v);
    }, { passive: false });

    window.addEventListener('storage', function(e) {
      if (e.key === 'bloom_settings') {
        try { applySettings(JSON.parse(e.newValue || '{}')); } catch(e2) {}
      } else if (e.key === 'bloom_changeTitlebar') {
        readTitlebarPref();
        applyWinTitle();
      } else if (e.key === 'bloom_locale') {
        refreshLocale();
      }
    });
    window.addEventListener('focus', refreshLocale);

    // Показ/скрытие окна (шлёт Rust): скрыто → глушим тикер, при показе
    // дорисовываем накопленное состояние.
    listenEvent('bloom-win-vis', function(v) {
      winVisible = !!v;
      if (!winVisible) { stopTicker(); return; }
      if (needRender) renderAll();
      else if (st.playing) startTicker();
    });

    listenEvent('bloom-mp-state',    function(p) { updateUI(p); });
    listenEvent('bloom-mp-accent',   function(c) { if (c) document.documentElement.style.setProperty('--accent', c); });
    listenEvent('bloom-mp-settings', function(p) { applySettings(p); });
    listenEvent('bloom-mp-volume',   function(v) {
      v = parseInt(v);
      if (!isFinite(v)) return;
      st.volume = v;
      var sl = document.getElementById('volSl'); if (sl) sl.value = v;
      var nm = document.getElementById('volNum'); if (nm) nm.textContent = v;
      updateVolumeIcon(v);
    });

    invoke('miniplayer_get_state').then(function(s) { if (s) updateUI(s); }).catch(function() {});
  }

  function waitForTauri() {
    if (window.__TAURI_INTERNALS__) start();
    else setTimeout(waitForTauri, 30);
  }
  waitForTauri();
})();
</script>
</body>
</html>
